# Netlify deployment configuration
# Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in:
#   Site settings → Environment variables (NOT committed via this file).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# `netlify dev` — serves the Vite app AND the /api functions on one port (8899).
# Point your tunnel (cloudflared) at http://localhost:8899, not Vite's 5170.
[dev]
  command = "npm run dev"
  targetPort = 5170
  port = 8899
  framework = "#custom"

# Serverless functions (GeniusPay subscription flow). The GeniusPay secret key
# and SUPABASE_SERVICE_ROLE_KEY must be set in Site settings → Environment
# variables — see .env.example. These live server-side only.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly API routes → functions. MUST come before the SPA catch-all below.
[[redirects]]
  from = "/api/subscription/create"
  to = "/.netlify/functions/create-subscription-payment"
  status = 200
[[redirects]]
  from = "/api/subscription/verify"
  to = "/.netlify/functions/verify-subscription-payment"
  status = 200
[[redirects]]
  from = "/api/subscription/webhook"
  to = "/.netlify/functions/geniuspay-webhook"
  status = 200

# SPA fallback — required for history-based routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the fingerprinted assets Vite emits under /assets/
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
